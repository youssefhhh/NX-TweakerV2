<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NX TWEAKER - Professional Edition</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>

<div class="status-container">
    <div id="statusMessage" class="status-message">
        <div class="status-icon"></div>
        <div class="status-text"></div>
        <div class="status-subtext"></div>
        <div class="status-progress"></div>
    </div>
</div>

<!-- Exit Button inside container -->


<!-- Custom Confirmation Modal -->


    <!-- Background elements -->
    <div class="bg-container">
        <!-- Main gradient overlays -->
        <div class="bg-gradient-overlay"></div>
        <div class="bg-gradient-1"></div>
        <div class="bg-gradient-2"></div>

        <!-- Grid pattern -->
        <div class="grid-pattern"></div>

        <!-- Floating particles (generated by JavaScript) -->
        <div id="particles-container"></div>
    </div>

    <div class="container">
        <div class="login-wrapper">

            <div class="login-brand">
                <div class="brand-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1 class="brand-title">NX TWEAKER</h1>
                <p class="brand-sub">Enter your license key to continue</p>
            </div>

            <div class="login-card">

                <form class="login-form">
                    <div class="form-group">
                        <label class="form-label" for="license">
                            <i class="fas fa-key"></i>
                            <span>License Key</span>
                        </label>
                        <div class="input-container">
                            <input
                                type="text"
                                id="license"
                                class="form-input"
                                placeholder="XXXX-XXXX-XXXX-XXXX"
                                required
                            />
                        </div>
                    </div>

                    <button
                        type="submit"
                        class="submit-button"
                        id="accessButton"
                        disabled
                    >
                        <span id="buttonText">ENTER LICENSE KEY</span>
                        <i class="fas fa-arrow-right button-icon"></i>
                    </button>
                </form>

                <div class="login-help">
                    <button class="help-link" onclick="window.open('https://discord.gg/nxgamingstore', '_blank')">
                        <i class="fas fa-question-circle"></i>
                        <span>Need help? Join our Discord</span>
                    </button>
                </div>

                <div class="login-divider"></div>

                <div class="social-buttons">
                    <button class="social-button" onclick="window.open('https://discord.gg/nxgamingstore', '_blank')">
                        <i class="fab fa-discord"></i>
                    </button>
                    <button class="social-button" onclick="window.open('https://t.me/NxStoreofficial', '_blank')">
                        <i class="fab fa-telegram"></i>
                    </button>
                    <button class="social-button" onclick="window.open('https://www.tiktok.com/@nxtiktoktv', '_blank')">
                        <i class="fab fa-tiktok"></i>
                    </button>
                    <button class="social-button" onclick="window.open('https://youtube.com/@nx_tweaker?si=mGyI5xsjGhpKSShe', '_blank')">
                        <i class="fab fa-youtube"></i>
                    </button>
                </div>

            </div>

            <p class="login-copyright">© 2024 NX TWEAKER</p>

        </div>
    </div>

    <script>
        function showStatusMessage(type, mainText, subText = '', duration = 4000) {
            const statusMessage = document.getElementById('statusMessage');
            const statusIcon = statusMessage.querySelector('.status-icon');
            const statusTextEl = statusMessage.querySelector('.status-text');
            const statusSubtext = statusMessage.querySelector('.status-subtext');


            statusMessage.className = 'status-message';
            

            statusTextEl.textContent = mainText;
            statusSubtext.textContent = subText;
            statusSubtext.style.display = subText ? 'block' : 'none';


            switch(type) {
                case 'success':
                    statusMessage.classList.add('success', 'show');
                    statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                    break;
                case 'error':
                    statusMessage.classList.add('error', 'show');
                    statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                    break;
                case 'loading':
                    statusMessage.classList.add('loading', 'show');
                    statusIcon.innerHTML = '<i class="fas fa-spinner"></i>';
                    break;
            }


            if (type !== 'loading' && duration > 0) {
                setTimeout(() => {
                    hideStatusMessage();
                }, duration);
            }
        }

        function hideStatusMessage() {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.classList.remove('show');
        }


        document.addEventListener('DOMContentLoaded', function() {
            const particlesContainer = document.getElementById('particles-container');
            const particleCount = 20;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                

                const x = Math.random() * 100;
                const y = Math.random() * 100;
                

                const delay = Math.random() * 5;
                
                particle.style.left = `${x}%`;
                particle.style.top = `${y}%`;
                particle.style.animationDelay = `${delay}s`;
                
                particlesContainer.appendChild(particle);
            }
        });


        const licenseInput = document.getElementById('license');
        const accessButton = document.getElementById('accessButton');
        const buttonText = document.getElementById('buttonText');

        licenseInput.addEventListener('input', function() {
            if (this.value.trim()) {
                accessButton.disabled = false;
                buttonText.textContent = 'ACCESS TOOL';
            } else {
                accessButton.disabled = true;
                buttonText.textContent = 'ENTER LICENSE KEY';
            }
        });

        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const license = licenseInput.value.trim();
            if (license && window.chrome && window.chrome.webview) {

                showStatusMessage('loading', 'Verifying License Key', 'Please wait while we authenticate your access...', 0);
                window.chrome.webview.postMessage(license);
            }
        });


        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.addEventListener('message', event => {
                if (event.data === "success") {
                    showStatusMessage(
                        'success', 
                        'License Verified Successfully!', 
                        'Welcome to NX TWEAKER Professional Edition', 
                        5000
                    );

                } else {
                    showStatusMessage(
                        'error', 
                        'Invalid License Key', 
                        'Please check your key and try again', 
                        6000
                    );
                }
            });
        }
		

    </script>
</body>
</html>
